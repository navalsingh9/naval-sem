name: Build & Release NAVAL-SEM

on:
  push:
    tags:
      - "v*.*.*"       # triggers on tags like v0.2.0
  workflow_dispatch:   # allow manual trigger from GitHub UI

permissions:
  contents: write      # needed to create releases and upload assets

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  build-windows:
    name: Windows EXE + MSI
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build EXE
        run: pyinstaller naval_sem.spec --clean --noconfirm

      - name: Install WiX 4
        run: dotnet tool install --global wix

      - name: Build MSI
        run: wix build installer/naval_sem.wxs -o dist/NAVAL-SEM-Setup.msi

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: dist/NAVAL-SEM.exe

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-msi
          path: dist/NAVAL-SEM-Setup.msi

  # ─────────────────────────────────────────────────────────────────────────────
  build-macos:
    name: macOS .app + DMG
    runs-on: macos-14        # Apple Silicon runner
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Build .app
        run: |
          pyinstaller naval_sem.spec --clean --noconfirm \
            --windowed --name "NAVAL-SEM" \
            --osx-bundle-identifier "io.naval-sem.app"

      - name: Create DMG
        run: |
          create-dmg \
            --volname "NAVAL-SEM" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "NAVAL-SEM.app" 175 190 \
            --hide-extension "NAVAL-SEM.app" \
            --app-drop-link 425 190 \
            dist/NAVAL-SEM.dmg \
            dist/NAVAL-SEM.app

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: dist/NAVAL-SEM.dmg

  # ─────────────────────────────────────────────────────────────────────────────
  build-linux:
    name: Linux Binary + .deb
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system GTK/WebKit deps
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            libgtk-3-0 libwebkit2gtk-4.0-dev \
            python3-gi python3-gi-cairo \
            gir1.2-webkit2-4.0

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build binary
        run: pyinstaller naval_sem.spec --clean --noconfirm

      - name: Build .deb
        run: |
          chmod +x build_linux.sh
          bash build_linux.sh

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-binary
          path: dist/NAVAL-SEM

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-deb
          path: dist/naval-sem_*.deb

  # ─────────────────────────────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: List assets
        run: ls -lh release-assets/

      - name: Create release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          name: "NAVAL-SEM ${{ github.ref_name }}"
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            release-assets/NAVAL-SEM.exe
            release-assets/NAVAL-SEM-Setup.msi
            release-assets/NAVAL-SEM.dmg
            release-assets/NAVAL-SEM
            release-assets/naval-sem_*.deb
          body: |
            ## NAVAL-SEM ${{ github.ref_name }}

            Fully offline PLS-SEM / CB-SEM desktop application — no internet required after install.

            ### Downloads
            | Platform | File | Notes |
            |---|---|---|
            | Windows | `NAVAL-SEM-Setup.msi` | Recommended installer |
            | Windows | `NAVAL-SEM.exe` | Portable, no install needed |
            | macOS | `NAVAL-SEM.dmg` | Drag to Applications |
            | Linux | `naval-sem_*.deb` | Debian/Ubuntu |
            | Linux | `NAVAL-SEM` | Portable binary |

            ### First run
            - **Windows MSI**: double-click the installer, then launch from Start Menu
            - **Windows EXE**: double-click anywhere — no install needed
            - **macOS**: right-click → Open (first time only, to bypass Gatekeeper)
            - **Linux deb**: `sudo dpkg -i naval-sem_*.deb && naval-sem`
