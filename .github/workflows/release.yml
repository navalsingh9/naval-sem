name: Build & Release NAVAL-SEM

on:
  push:
    tags:
      - "v*.*.*"       # triggers on tags like v0.2.0
  workflow_dispatch:   # allow manual trigger from GitHub UI

permissions:
  contents: write      # needed to create releases and upload assets

jobs:
  # ── Windows ────────────────────────────────────────────────────────────────
  build-windows:
    name: Windows EXE + MSI
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build EXE
        run: pyinstaller naval_sem.spec --clean --noconfirm

      - name: Install WiX 3
        run: |
          choco install wixtoolset --version 3.14.0 -y --no-progress
          echo "C:\Program Files (x86)\WiX Toolset v3.14\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Create license.rtf
        run: |
          Set-Content -Path "installer\license.rtf" -Value "{\rtf1\ansi NAVAL-SEM is shareware. Free to use. Donations welcome to support development. No warranty is provided. Use at your own risk.}"

      - name: Build MSI
        run: |
          candle.exe installer\naval_sem.wxs -o installer\naval_sem.wixobj
          light.exe installer\naval_sem.wixobj -o dist\NAVAL-SEM-Setup.msi -ext WixUIExtension

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: dist/NAVAL-SEM.exe

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-msi
          path: dist/NAVAL-SEM-Setup.msi

  # ── macOS ──────────────────────────────────────────────────────────────────
  build-macos:
    name: macOS .app + DMG
    runs-on: macos-14        # Apple Silicon runner
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Build .app
        run: pyinstaller naval_sem.spec --clean --noconfirm

      - name: Create DMG
        run: |
          create-dmg \
            --volname "NAVAL-SEM" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "NAVAL-SEM.app" 175 190 \
            --hide-extension "NAVAL-SEM.app" \
            --app-drop-link 425 190 \
            dist/NAVAL-SEM.dmg \
            dist/NAVAL-SEM.app

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: dist/NAVAL-SEM.dmg

  # ── Linux ──────────────────────────────────────────────────────────────────
  build-linux:
    name: Linux Binary + .deb
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system GTK/WebKit deps
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            libgtk-3-0 libwebkit2gtk-4.0-dev \
            python3-gi python3-gi-cairo \
            gir1.2-webkit2-4.0

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build binary
        run: pyinstaller naval_sem.spec --clean --noconfirm

      - name: Build .deb
        run: |
          chmod +x build_linux.sh
          bash build_linux.sh

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-binary
          path: dist/NAVAL-SEM

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-deb
          path: dist/naval-sem_*.deb

  # ── Release ────────────────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: List assets
        run: ls -lh release-assets/

      - name: Create release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          name: "NAVAL-SEM ${{ github.ref_name }}"
          draft: false
          prerelease: false
          generate_release_notes: false
          files: |
            release-assets/NAVAL-SEM.exe
            release-assets/NAVAL-SEM-Setup.msi
            release-assets/NAVAL-SEM.dmg
            release-assets/NAVAL-SEM
            release-assets/naval-sem_*.deb
          body: |
            ## NAVAL-SEM ${{ github.ref_name }}

            Fully offline PLS-SEM / CB-SEM desktop application — visual model builder, bootstrapping, HTMT, and fit indices. No internet required after install.

            ---

            ### Downloads
            | Platform | File | Notes |
            |---|---|---|
            | Windows | `NAVAL-SEM-Setup.msi` | Recommended — installs with Start Menu + uninstall |
            | Windows | `NAVAL-SEM.exe` | Portable — drop anywhere and run |
            | macOS | `NAVAL-SEM.dmg` | Drag to Applications |
            | Linux | `naval-sem_*.deb` | Debian/Ubuntu installer |
            | Linux | `NAVAL-SEM` | Portable binary |

            ---

            ### 💛 Support Development
            NAVAL-SEM is free to use. If you find it useful, please consider donating to help keep the project running.

            👉 [Donate via PayPal](https://www.paypal.com/paypalme/singhn9)

            ---

            ### 🐛 Bug Reports & Feedback
            Found a bug or have a suggestion? We read every submission!

            👉 [Submit Bug Report / Feedback](https://forms.gle/N4AmCkJyCK6HHsZz8)

            ---

            ### ⚠️ Windows Security Note
            Windows may show a SmartScreen warning on first run — this is normal for new apps without a paid code-signing certificate. Click **More info → Run anyway**.

            ### ⚠️ macOS Note
            Right-click → Open the first time to bypass Gatekeeper.
