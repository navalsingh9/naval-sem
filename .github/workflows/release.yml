name: Build & Release NAVAL-SEM

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

# Default to least privilege
permissions:
  contents: read

jobs:
  # ── Windows ────────────────────────────────────────────────────────────────
  build-windows:
    name: Windows EXE + MSI
    runs-on: windows-latest

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: "3.11"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --locked

      - name: Build EXE
        run: uv run pyinstaller naval_sem.spec --clean --noconfirm

      - name: Add WiX 3 to PATH
        run: |
          $wixPath = Get-ChildItem "C:\Program Files (x86)" -Directory | Where-Object { $_.Name -like "WiX*" } | Select-Object -First 1 -ExpandProperty FullName
          echo "$wixPath\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          echo "Found WiX at: $wixPath"

      - name: Create license.rtf
        run: |
          Set-Content -Path "installer\license.rtf" -Value "{\rtf1\ansi NAVAL-SEM is shareware. Free to use. Donations welcome to support development. No warranty is provided. Use at your own risk.}"

      - name: Build MSI
        run: |
          candle.exe installer\naval_sem.wxs -o installer\naval_sem.wixobj
          light.exe installer\naval_sem.wixobj -o dist\NAVAL-SEM-Setup.msi -ext WixUIExtension

      - name: Upload EXE artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: windows-exe
          path: dist/NAVAL-SEM.exe

      - name: Upload MSI artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: windows-msi
          path: dist/NAVAL-SEM-Setup.msi

  # ── macOS ──────────────────────────────────────────────────────────────────
  build-macos:
    name: macOS .app + DMG
    runs-on: macos-14

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: "3.11"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --locked

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Build .app
        run: |
          uv run pyinstaller naval_sem.spec --clean --noconfirm

          # If spec produced a binary instead of .app bundle, rebuild as windowed
          if [ ! -d "dist/NAVAL-SEM.app" ]; then
            echo "No .app found, rebuilding with --windowed..."

            uv run pyinstaller launcher.py \
              --name "NAVAL-SEM" \
              --windowed \
              --clean --noconfirm \
              --osx-bundle-identifier "io.naval-sem.app"
          fi

      - name: Create DMG
        run: |
          create-dmg \
            --volname "NAVAL-SEM" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --app-drop-link 425 190 \
            dist/NAVAL-SEM.dmg \
            "dist/NAVAL-SEM.app"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: macos-dmg
          path: dist/NAVAL-SEM.dmg

  # ── Linux ──────────────────────────────────────────────────────────────────
  build-linux:
    name: Linux Binary + .deb
    runs-on: ubuntu-22.04

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: "3.11"
          enable-cache: true

      - name: Install system GTK/WebKit deps
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            libgtk-3-0 \
            libwebkit2gtk-4.0-dev \
            python3-gi \
            python3-gi-cairo \
            gir1.2-webkit2-4.0

      - name: Install dependencies
        run: uv sync --locked

      - name: Build binary
        run: uv run pyinstaller naval_sem.spec --clean --noconfirm

      - name: Build .deb
        run: |
          chmod +x build_linux.sh
          bash build_linux.sh

      - name: Upload binary artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: linux-binary
          path: dist/NAVAL-SEM

      - name: Upload .deb artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: linux-deb
          path: dist/naval-sem_*.deb

  # ── Release ────────────────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest

    if: startsWith(github.ref, 'refs/tags/')

    # Only this job gets write permission
    permissions:
      contents: write

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: release-assets
          merge-multiple: true

      - name: List assets
        run: ls -lh release-assets/

      - name: Create release and upload assets
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          name: "NAVAL-SEM ${{ github.ref_name }}"
          draft: false
          prerelease: false
          generate_release_notes: false
          files: |
            release-assets/NAVAL-SEM.exe
            release-assets/NAVAL-SEM-Setup.msi
            release-assets/NAVAL-SEM.dmg
            release-assets/NAVAL-SEM
            release-assets/naval-sem_*.deb
          body: |
            ## NAVAL-SEM ${{ github.ref_name }}

            Fully offline PLS-SEM / CB-SEM desktop application — visual model builder, bootstrapping, HTMT, and fit indices. No internet required after install.

            ---

            ### Downloads

            | Platform | File | Notes |
            |---|---|---|
            | Windows | `NAVAL-SEM-Setup.msi` | Recommended — installs with Start Menu + uninstall |
            | Windows | `NAVAL-SEM.exe` | Portable — drop anywhere and run |
            | macOS | `NAVAL-SEM.dmg` | Drag to Applications |
            | Linux | `naval-sem_*.deb` | Debian/Ubuntu installer |
            | Linux | `NAVAL-SEM` | Portable binary |

            ---

            ### 💛 Support Development

            NAVAL-SEM is free to use. If you find it useful, please consider donating to help keep the project running.

            👉 https://www.paypal.com/paypalme/singhn9

            ---

            ### 🐛 Bug Reports & Feedback

            Found a bug or have a suggestion? We read every submission!

            👉 https://forms.gle/N4AmCkJyCK6HHsZz8

            ---

            ### ⚠️ Windows Security Note

            Windows may show a SmartScreen warning on first run — this is normal for new apps without a paid code-signing certificate.

            Click:
            More info → Run anyway

            ### ⚠️ macOS Note

            Right-click → Open the first time to bypass Gatekeeper.